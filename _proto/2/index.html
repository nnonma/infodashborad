<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>— dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --line: #2a2a2a;
    --muted: #444;
    --dim: #666;
    --text: #c8c8c8;
    --hi: #e8e8e8;
    --accent: #a0a0ff;
    --done-color: #444;
    --red: #ff6b6b;
    --green: #6bffb8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOCK SCREEN ── */
  #lock {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 100;
    transition: opacity .4s, visibility .4s;
  }
  #lock.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .lock-symbol {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .3em;
    color: var(--dim);
  }

  #pw-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--muted);
    color: var(--hi);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    letter-spacing: .4em;
    text-align: center;
    width: 240px;
    padding: 8px 0;
    outline: none;
    transition: border-color .2s;
    -webkit-text-security: disc;
    text-security: disc;
  }
  #pw-input:focus { border-color: var(--accent); }
  #pw-input.shake {
    animation: shake .3s ease;
    border-color: var(--red);
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  #lock-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--dim);
    min-height: 16px;
    text-align: center;
  }
  #lock-msg.red { color: var(--red); }

  /* ── MAIN CONTENT ── */
  #app {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }

  /* header */
  .site-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 56px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .site-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: .25em;
    color: var(--dim);
  }
  .site-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* section */
  .section { margin-bottom: 52px; }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* ── TASKS ── */
  .task-list { display: flex; flex-direction: column; gap: 2px; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 11px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .task-item:hover { background: var(--bg2); }
  .task-item:active { background: var(--bg3); }

  .task-bullet {
    flex-shrink: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid var(--muted);
    margin-top: 6px;
    transition: background .2s, border-color .2s;
  }
  .task-item.done .task-bullet {
    background: var(--muted);
    border-color: var(--muted);
  }

  .task-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    transition: color .2s, text-decoration .2s;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--done-color);
  }

  .task-tag {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: .1em;
    padding: 2px 7px;
    border-radius: 2px;
    background: var(--bg3);
    color: var(--dim);
    margin-top: 5px;
    align-self: flex-start;
  }

  /* add task */
  .add-task-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    margin-top: 8px;
  }
  .add-task-plus {
    flex-shrink: 0;
    width: 6px; height: 6px;
    margin-top: 1px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
  }
  #new-task-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 4px 0;
    outline: none;
    transition: border-color .2s;
  }
  #new-task-input:focus { border-color: var(--accent); }
  #new-task-input::placeholder { color: var(--muted); font-size: 13px; }

  /* ── LINKS ── */
  .link-group { margin-bottom: 28px; }
  .link-group-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: .3em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .link-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .link-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 3px;
    text-decoration: none;
    color: var(--text);
    font-size: 13px;
    transition: border-color .15s, color .15s, background .15s;
    white-space: nowrap;
  }
  .link-chip:hover {
    border-color: var(--dim);
    color: var(--hi);
    background: var(--bg2);
  }
  .link-chip .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .link-chip.magazine .dot { background: var(--accent); }
  .link-chip.docs .dot { background: #aaffaa; }
  .link-chip.editor .dot { background: #ffccaa; }
</style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock">
  <div class="lock-symbol">● ● ●</div>
  <input id="pw-input" type="password" inputmode="numeric" autocomplete="off" placeholder="· · · · · · · · · · · · ·" autofocus />
  <div id="lock-msg"></div>
</div>

<!-- ── MAIN ── -->
<div id="app" style="display:none">
  <header class="site-header">
    <span class="site-title">— index</span>
    <span class="site-date" id="header-date"></span>
  </header>

  <!-- TASKS -->
  <section class="section">
    <div class="section-label">tasks</div>
    <div class="task-list" id="task-list"></div>
    <div class="add-task-row">
      <span class="add-task-plus">+</span>
      <input id="new-task-input" type="text" placeholder="新しいタスクを追加…" />
    </div>
  </section>

  <!-- LINKS -->
  <section class="section">
    <div class="section-label">links</div>
    <div id="link-area"></div>
  </section>
</div>

<script>
// ── PASSWORD ──
const CORRECT = '2820285082126';
let attempts = 0;
let lockUntil = null;

const lockEl    = document.getElementById('lock');
const appEl     = document.getElementById('app');
const pwInput   = document.getElementById('pw-input');
const lockMsg   = document.getElementById('lock-msg');

function unlock() {
  lockEl.classList.add('hidden');
  appEl.style.display = 'block';
  initApp();
}

function showMsg(txt, isRed) {
  lockMsg.textContent = txt;
  lockMsg.className = isRed ? 'red' : '';
}

function fmtDate(d) {
  return d.getFullYear() + '/' +
    String(d.getMonth()+1).padStart(2,'0') + '/' +
    String(d.getDate()).padStart(2,'0') + '  ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
}

pwInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const now = Date.now();

  if (lockUntil && now < lockUntil) {
    const remain = Math.ceil((lockUntil - now) / 1000);
    showMsg('wait ' + remain + 's', true);
    return;
  }

  const val = pwInput.value.trim();
  if (val === CORRECT) {
    attempts = 0;
    unlock();
  } else {
    attempts++;
    pwInput.value = '';
    pwInput.classList.add('shake');
    setTimeout(() => pwInput.classList.remove('shake'), 300);

    const ts = fmtDate(new Date());
    if (attempts >= 3) {
      lockUntil = now + 5 * 60 * 1000;
      attempts = 0;
      showMsg('last attempt: ' + ts, true);
    } else {
      showMsg('— ' + ts, true);
    }
  }
});

// ── APP ──
function initApp() {
  // header date
  const d = new Date();
  document.getElementById('header-date').textContent =
    d.getFullYear() + '.' +
    String(d.getMonth()+1).padStart(2,'0') + '.' +
    String(d.getDate()).padStart(2,'0');

  loadData();
}

// ── DATA (data.json から fetch、なければ fallback) ──
async function loadData() {
  let data;
  try {
    const res = await fetch('data.json');
    data = await res.json();
  } catch {
    data = fallbackData();
  }
  renderTasks(data.tasks || []);
  renderLinks(data.links || {});
}

function fallbackData() {
  return {
    tasks: [
      { id: 1, text: "data.json をGitHubにpushする", done: false, tag: "setup" },
      { id: 2, text: "magazine/ の各HTMLを作成する", done: false, tag: "setup" },
      { id: 3, text: "build.yml を追加する", done: false, tag: "setup" },
      { id: 4, text: "VRChat Udon連携を試す", done: false, tag: "vrchat" }
    ],
    links: {
      magazine: [
        { label: "文化系", href: "magazine/culture.html" },
        { label: "投機・投資系", href: "magazine/investment.html" },
        { label: "政治・国際系", href: "magazine/politics.html" },
        { label: "法律・統計系", href: "magazine/policy.html" },
        { label: "科学系", href: "magazine/science.html" }
      ],
      docs: [],
      editor: []
    }
  };
}

// ── TASKS ──
let tasks = [];

function renderTasks(data) {
  tasks = data;
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  tasks.forEach(t => list.appendChild(makeTaskEl(t)));
}

function makeTaskEl(t) {
  const row = document.createElement('div');
  row.className = 'task-item' + (t.done ? ' done' : '');
  row.dataset.id = t.id;

  const bullet = document.createElement('div');
  bullet.className = 'task-bullet';

  const txt = document.createElement('div');
  txt.className = 'task-text';
  txt.textContent = t.text;

  row.appendChild(bullet);
  row.appendChild(txt);

  if (t.tag) {
    const tag = document.createElement('div');
    tag.className = 'task-tag';
    tag.textContent = t.tag;
    row.appendChild(tag);
  }

  row.addEventListener('click', () => toggleTask(t.id));
  return row;
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  const el = document.querySelector(`.task-item[data-id="${id}"]`);
  if (el) el.className = 'task-item' + (t.done ? ' done' : '');
  saveTasks();
}

// add task
document.getElementById('new-task-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const txt = e.target.value.trim();
  if (!txt) return;
  const newTask = { id: Date.now(), text: txt, done: false, tag: '' };
  tasks.push(newTask);
  document.getElementById('task-list').appendChild(makeTaskEl(newTask));
  e.target.value = '';
  saveTasks();
});

function saveTasks() {
  // done状態をlocalStorageに保存（data.jsonは変えない）
  const state = {};
  tasks.forEach(t => { state[t.id] = t.done; });
  try { localStorage.setItem('task_state', JSON.stringify(state)); } catch {}
}

function restoreTaskState() {
  try {
    const state = JSON.parse(localStorage.getItem('task_state') || '{}');
    tasks.forEach(t => { if (state[t.id] !== undefined) t.done = state[t.id]; });
  } catch {}
}

// ── LINKS ──
function renderLinks(linksData) {
  const area = document.getElementById('link-area');
  area.innerHTML = '';

  const groups = [
    { key: 'magazine', label: 'magazine', cls: 'magazine' },
    { key: 'docs',     label: 'docs',     cls: 'docs' },
    { key: 'editor',   label: 'editor',   cls: 'editor' },
  ];

  groups.forEach(g => {
    const items = linksData[g.key] || [];
    if (!items.length) return;

    const grp = document.createElement('div');
    grp.className = 'link-group';

    const lbl = document.createElement('div');
    lbl.className = 'link-group-label';
    lbl.textContent = g.label;
    grp.appendChild(lbl);

    const grid = document.createElement('div');
    grid.className = 'link-grid';

    items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'link-chip ' + g.cls;
      a.href = item.href;
      const dot = document.createElement('span');
      dot.className = 'dot';
      a.appendChild(dot);
      a.appendChild(document.createTextNode(item.label));
      grid.appendChild(a);
    });

    grp.appendChild(grid);
    area.appendChild(grp);
  });
}

// ロック画面でEnterを待つ間もタイマーでメッセージを更新
setInterval(() => {
  if (lockUntil && Date.now() < lockUntil) {
    const remain = Math.ceil((lockUntil - Date.now()) / 1000);
    showMsg('locked — wait ' + remain + 's', true);
  }
}, 1000);
</script>
</body>
</html>
