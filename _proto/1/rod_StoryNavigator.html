<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロッド物語 — Story Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --bg:      #080a10;
  --s1:      #0d1018;
  --s2:      #111520;
  --s3:      #161c2a;
  --s4:      #1c2234;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --anzu:    #e09090;
  --kuri:    #82aad8;
  --tension: #c87858;
  --flag:    #d4b84a;
  --green:   #5db882;
  --dim:     #4a5570;
  --muted:   #1e2438;
  --text:    #c4ccdc;
  --text2:   #e8ecf4;

  /* phase colors */
  --p1: #4a90c8;
  --p2: #5ab890;
  --p3: #c8a840;
  --p4: #c07840;
  --p5: #c05858;
  --p6: #9058c0;
}

/* ─── RESET ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
#header {
  flex: 0 0 auto;
  height: 52px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 100;
}
#header h1 {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 1.05rem;
  letter-spacing: 0.18em;
  color: var(--text2);
  white-space: nowrap;
}
.h-sep { width: 1px; height: 24px; background: var(--border); }
.h-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
}
.h-btn {
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--dim);
  background: none;
  transition: all .18s;
  white-space: nowrap;
}
.h-btn:hover { color: var(--text2); border-color: var(--border2); }
.h-btn.primary { color: var(--green); border-color: rgba(93,184,130,.4); }
.h-btn.primary:hover { background: rgba(93,184,130,.08); }
.spacer { flex: 1; }
.legend-row {
  display: flex; align-items: center; gap: 14px;
}
.leg {
  display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.56rem; color: var(--dim);
}
.leg-line { width: 22px; height: 2px; border-radius: 1px; }
.leg-dot  { width: 8px; height: 8px; border-radius: 50%; }

/* ═══════════════════════════════════════
   MAIN SPLIT
═══════════════════════════════════════ */
#body {
  flex: 1 1 auto;
  display: flex;
  overflow: hidden;
}

/* ─── LEFT COLUMN ─── */
#left {
  flex: 0 0 auto;
  width: 62%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

/* GRAPH AREA */
#graph-wrap {
  flex: 0 0 auto;
  height: 220px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  position: relative;
  user-select: none;
}
#graph-canvas {
  display: block;
  width: 100%; height: 100%;
  cursor: crosshair;
}

/* PHASE STRIP */
#phase-strip {
  flex: 0 0 auto;
  height: 52px;
  background: var(--s2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
}
.phase-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border-right: 1px solid var(--border);
  gap: 2px;
  transition: background .15s;
  background: none; border-top: none; border-bottom: none; border-left: none;
}
.phase-btn:last-child { border-right: none; }
.phase-btn:hover { background: rgba(255,255,255,.03); }
.phase-btn.active { background: rgba(255,255,255,.05); }
.phase-btn .pb-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem; letter-spacing: .1em; color: var(--dim);
}
.phase-btn .pb-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 0.72rem;
  transition: color .15s;
}
.phase-btn.active .pb-name { font-weight: 700; }
.phase-btn .pb-bar {
  width: 70%; height: 2px;
  background: var(--muted);
  border-radius: 1px; overflow: hidden;
}
.phase-btn .pb-fill { height: 100%; border-radius: 1px; }

/* EVENT LIST */
#event-list-wrap {
  flex: 1 1 auto;
  overflow-y: auto;
  background: var(--s1);
}
.ev-section-title {
  padding: 10px 18px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.54rem; letter-spacing: .22em;
  color: var(--dim); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.ev-section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.ev-item {
  padding: 12px 18px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer;
  transition: background .12s;
  display: flex; gap: 12px; align-items: flex-start;
}
.ev-item:hover { background: rgba(255,255,255,.025); }
.ev-item.selected { background: rgba(255,255,255,.05); }
.ev-icon {
  flex: 0 0 auto; margin-top: 2px;
  font-size: 0.7rem; color: var(--dim);
}
.ev-body { flex: 1; min-width: 0; }
.ev-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 0.82rem; color: var(--text2);
  margin-bottom: 3px;
}
.ev-text {
  font-size: 0.75rem; line-height: 1.75;
  color: var(--dim);
}
.ev-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem; letter-spacing: .08em;
  padding: 2px 6px; border-radius: 1px;
  border: 1px solid;
}

/* ─── RIGHT COLUMN ─── */
#right {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--s1);
}

/* Right tabs */
#rtabs {
  flex: 0 0 auto;
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--s2);
}
.rtab {
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.56rem; letter-spacing: .12em;
  color: var(--dim); cursor: pointer;
  border-bottom: 2px solid transparent;
  text-transform: uppercase;
  background: none; border-top: none; border-left: none; border-right: none;
  transition: color .15s;
  white-space: nowrap;
}
.rtab:hover { color: var(--text); }
.rtab.active { color: var(--text2); border-bottom-color: var(--green); }

/* Right content */
#rcontent {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 16px;
}
.rpage { display: none; }
.rpage.active { display: block; animation: fadein .2s ease; }
@keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ─ OVERVIEW CARDS ─ */
.phase-title-card {
  margin-bottom: 14px;
  padding: 14px 16px;
  border-left: 3px solid;
  background: var(--s2);
}
.ptc-phase { font-family: 'JetBrains Mono', monospace; font-size: .54rem; letter-spacing: .2em; color: var(--dim); margin-bottom: 4px; }
.ptc-name { font-family: 'Shippori Mincho B1', serif; font-size: 1.05rem; color: var(--text2); }
.ptc-sub { font-size: .75rem; color: var(--dim); margin-top: 4px; line-height: 1.6; }

.info-block { margin-bottom: 14px; }
.ib-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: .52rem; letter-spacing: .2em;
  color: var(--dim); text-transform: uppercase;
  margin-bottom: 7px;
  display: flex; align-items: center; gap: 8px;
}
.ib-label::after { content:''; flex:1; height:1px; background:var(--border); }
.ib-body { font-size: .78rem; line-height: 1.85; color: var(--text); }

/* temp bars */
.temp-row {
  display: grid; grid-template-columns: 60px 1fr 36px;
  align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.temp-name { font-size: .7rem; }
.temp-bar { height: 5px; background: var(--muted); border-radius: 3px; overflow: hidden; }
.temp-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.temp-val { font-family: 'JetBrains Mono', monospace; font-size: .62rem; text-align: right; }

/* flag items */
.flag-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer; transition: background .12s;
}
.flag-row:hover { background: rgba(255,255,255,.03); margin: 0 -8px; padding: 8px 8px; }
.flag-gem { font-size: .9rem; }
.flag-name { flex: 1; font-size: .78rem; }
.flag-bar { width: 50px; height: 3px; background: var(--muted); border-radius: 2px; overflow: hidden; }
.flag-fill { height: 100%; border-radius: 2px; }
.flag-w { font-family: 'JetBrains Mono', monospace; font-size: .58rem; width: 28px; text-align: right; }
.flag-phase-note { font-size: .68rem; color: var(--dim); line-height: 1.6; }

/* term items */
.term-item {
  padding: 10px 12px; margin-bottom: 6px;
  background: var(--s3); border: 1px solid var(--border);
  cursor: pointer; transition: border-color .15s;
}
.term-item:hover { border-color: var(--border2); }
.term-name { font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: var(--green); margin-bottom: 4px; }
.term-desc { font-size: .74rem; line-height: 1.75; color: var(--dim); }

/* error items */
.err-item {
  padding: 10px 12px; margin-bottom: 6px;
  border-left: 3px solid var(--flag);
  background: var(--s3); cursor: pointer; transition: opacity .15s;
}
.err-item.resolved { border-left-color: var(--green); opacity: .55; }
.err-item:hover { opacity: .85; }
.err-phase { font-family: 'JetBrains Mono', monospace; font-size: .52rem; letter-spacing: .1em; color: var(--dim); margin-bottom: 4px; }
.err-text { font-size: .76rem; line-height: 1.7; }

/* comparison grid */
.cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.cmp-card { background: var(--s3); border: 1px solid var(--border); padding: 12px 14px; }
.cmp-who { font-family: 'Shippori Mincho B1', serif; font-size: .8rem; margin-bottom: 6px; }
.cmp-body { font-size: .74rem; line-height: 1.8; color: var(--dim); }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 900;
  align-items: center; justify-content: center; padding: 20px;
}
#modal-overlay.open { display: flex; }
.modal {
  background: var(--s2);
  border: 1px solid var(--border2);
  width: 520px; max-height: 88vh;
  overflow-y: auto;
  animation: fadein .2s ease;
}
.mhdr {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.mhtitle { font-family: 'Shippori Mincho B1', serif; font-size: .95rem; color: var(--text2); }
.mclose { cursor:pointer; color:var(--dim); font-size:1.1rem; background:none; border:none; }
.mclose:hover { color: var(--text2); }
.mbody { padding: 20px; }
.mfoot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.field { margin-bottom: 14px; }
.flabel {
  display: block; font-family: 'JetBrains Mono', monospace;
  font-size: .54rem; letter-spacing: .2em; color: var(--dim);
  margin-bottom: 6px; text-transform: uppercase;
}
.fi, .fs, .fta {
  width: 100%; background: var(--s3);
  border: 1px solid var(--border); color: var(--text);
  padding: 9px 11px; font-family: 'Noto Sans JP', sans-serif;
  font-size: .8rem; outline: none;
  transition: border-color .2s; resize: vertical; line-height: 1.6;
}
.fi:focus, .fs:focus, .fta:focus { border-color: var(--border2); }
.fs option { background: var(--s2); }
.btn {
  padding: 8px 18px; font-family: 'JetBrains Mono', monospace;
  font-size: .62rem; letter-spacing: .08em;
  cursor: pointer; border: 1px solid; background: none; transition: all .18s;
}
.btn-g { color: var(--green); border-color: rgba(93,184,130,.4); }
.btn-g:hover { background: rgba(93,184,130,.1); }
.btn-s { color: var(--dim); border-color: var(--border); }
.btn-s:hover { color: var(--text2); }
.btn-d { color: #e07070; border-color: rgba(224,112,112,.35); }
.btn-d:hover { background: rgba(224,112,112,.1); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* add btn */
.add-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; font-family: 'JetBrains Mono', monospace;
  font-size: .56rem; letter-spacing: .08em; cursor: pointer;
  border: 1px solid var(--border); color: var(--dim); background: none;
  transition: all .15s; margin-bottom: 10px;
}
.add-btn:hover { color: var(--green); border-color: rgba(93,184,130,.4); }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div id="header">
  <h1>ロッド物語</h1>
  <div class="h-sep"></div>
  <div class="h-tag">Story Navigator</div>
  <div class="h-sep"></div>
  <div class="legend-row">
    <div class="leg"><div class="leg-line" style="background:var(--anzu)"></div>杏の心理温度</div>
    <div class="leg"><div class="leg-line" style="background:var(--kuri)"></div>栗の心理温度</div>
    <div class="leg"><div class="leg-line" style="background:var(--tension); border-top: 2px dashed var(--tension); height:0"></div>緊張・危機度</div>
    <div class="leg"><div class="leg-dot" style="background:var(--flag)"></div>フラグ</div>
  </div>
  <div class="spacer"></div>
  <button class="h-btn" onclick="exportJSON()">JSON書き出し</button>
  <button class="h-btn" onclick="importJSON()">JSON読み込み</button>
  <button class="h-btn primary" onclick="saveHTML()">HTML保存</button>
</div>

<!-- ═══ BODY ═══ -->
<div id="body">

  <!-- LEFT -->
  <div id="left">
    <!-- GRAPH -->
    <div id="graph-wrap">
      <canvas id="graph-canvas"></canvas>
    </div>
    <!-- PHASE STRIP -->
    <div id="phase-strip"></div>
    <!-- EVENT LIST -->
    <div id="event-list-wrap">
      <div id="event-list"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="rtabs">
      <button class="rtab active" onclick="switchRTab('overview',this)">概要</button>
      <button class="rtab" onclick="switchRTab('psychology',this)">心理詳細</button>
      <button class="rtab" onclick="switchRTab('flags',this)">フラグ</button>
      <button class="rtab" onclick="switchRTab('terms',this)">設定・用語</button>
      <button class="rtab" onclick="switchRTab('errors',this)">エラーメモ</button>
    </div>
    <div id="rcontent">
      <div class="rpage active" id="rp-overview"></div>
      <div class="rpage" id="rp-psychology"></div>
      <div class="rpage" id="rp-flags"></div>
      <div class="rpage" id="rp-terms"></div>
      <div class="rpage" id="rp-errors"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="mhdr">
      <div class="mhtitle" id="m-title">編集</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="m-body"></div>
    <div class="mfoot">
      <button class="btn btn-d" id="m-del" onclick="_mDel()" style="display:none">削除</button>
      <button class="btn btn-s" onclick="closeModal()">閉じる</button>
      <button class="btn btn-g" onclick="_mSave()">保存</button>
    </div>
  </div>
</div>
<input type="file" id="json-input" accept=".json" style="display:none" onchange="loadJSON(event)">

<script>
// ══════════════════════════════════════════════════════════
//  DATABASE
// ══════════════════════════════════════════════════════════
let db = {
  phases: [
    {
      id: 1, name: '導入', color: '#4a90c8',
      sub: '杏がロッカーの前で記憶を刻む。任務受領。',
      event: '杏はロッカーの前にたたずんでいた。そのロッカーをあけて、杏は身を委ねた。いつのまにか瞳にはそのロッカーの記憶が刻まれた。\n\n所属先aの要請のもと、杏と栗はアポトーシスな崩壊が進んでいる細胞的地域へ向かう。そこは杏にとっての故郷であり、杏と栗が出会った場所でもあった。その日は海で過ごした。\n\n所属先aの要請：崩壊地域に残された記録（コドン・配列）の抽出・摘出・保管。',
      anzu_temp: 35, kuri_temp: 20, tension: 20,
      anzu_psych: '故郷への懐かしさと、任務へのうっすらした拒絶。「成熟した環境」への適応プレッシャーを、ロッカーという局在空間に沈み込むことで払いのけてきた杏にとって、この帰郷は静かな予兆を帯びている。',
      kuri_psych: '事務的で効率的な、冷徹な義務感。社会を維持するための「正しい側」にいるという自負がある。杏の適応障害的な摩擦を理解はするが、実感として共有していない。',
      theme: '「適応」という窒息感。社会の喧騒から、杏が自身の聖域へ沈み込む対比。静かな予兆のカット。',
      flags_active: [1],
      terms_active: [1, 5, 7, 8],
      draft_note: '最初は滴など、カットを入れながら、何かが静かに動き始めている予感をさせる描写。映像作品ではないから長くなりすぎると退屈する。パラ、パラ、パラとカットが移ろう感じで、説明は欠如していていい。'
    },
    {
      id: 2, name: '到着・侵入', color: '#5ab890',
      sub: '泉・獣道・裏口から遺跡へ強行侵入。',
      event: '故郷の村に到着。遺跡（細胞核）の正規の入り口が塞がっていることを確認。入り口前の泉のほとりで一息つく（傷が癒える）。\n\n村はずれの箇所から線虫（物の怪の類）が侵入しているのを目撃。栗と杏は同じルートから遺跡侵入を試みる。\n\n獣道を進むと大きな空洞に到達し、そこから侵入する。',
      anzu_temp: 40, kuri_temp: 20, tension: 35,
      anzu_psych: '正規ルートを避ける杏の身体性。「正規ルートは監視されているみたいで肌が痒くなる」という拒絶反応。ゲストキーや裏口（ロッカー的空間）からの侵入を好む。泉のほとりでほんの少し緩む。',
      kuri_psych: '栗は組織の正規通行証でゲートを通ろうとするが、入り口が塞がれているため杏の裏口経路を使わざるを得ない。事務的な義務感は変わらない。',
      theme: '「正攻法」対「搦め手」。システムの穴（バグ）を突くことでしか進めない杏の生存戦略。',
      flags_active: [1],
      terms_active: [1, 3, 5, 9],
      draft_note: '侵入の描写のイメージができていない。他にどんな侵入手段があるか。遺跡の到着と侵入について、何か杏や栗やこの世界の当たり前の断片を感じられるような描写機会があってもいい。'
    },
    {

const saved = localStorage.getItem('rod-nav-db');
if (saved) { try { db = JSON.parse(saved); } catch(e){} }
function persist() { localStorage.setItem('rod-nav-db', JSON.stringify(db)); }

let currentPhaseId = 1;
let currentRTab = 'overview';

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  renderAll();
  selectPhase(1);
  window.addEventListener('resize', () => {
    renderGraph();
  });
});

function renderAll() {
  renderPhaseStrip();
  renderGraph();
  renderEventList();
  renderRight();
}

// ══════════════════════════════════════════════════════════
//  GRAPH
// ══════════════════════════════════════════════════════════
function renderGraph() {
  const canvas = document.getElementById('graph-canvas');
  const wrap   = document.getElementById('graph-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const padL = 44, padR = 24, padT = 18, padB = 32;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const n = db.phases.length;

  // ─ grid ─
  [0, 25, 50, 75, 100].forEach(v => {
    const y = padT + plotH * (1 - v / 100);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y);
    ctx.strokeStyle = v === 0 ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1; ctx.setLineDash([]); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '9px "JetBrains Mono"';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(v, padL - 5, y);
  });

  // ─ phase bands ─
  db.phases.forEach((ph, i) => {
    const x1 = padL + plotW * i / (n - 1) - plotW / (2 * (n - 1));
    const x2 = padL + plotW * (i + 1) / (n - 1) - plotW / (2 * (n - 1));
    const bx = i === 0 ? padL : x1;
    const bw = i === n - 1 ? (padL + plotW) - bx : x2 - bx;
    if (ph.id === currentPhaseId) {
      ctx.fillStyle = ph.color + '14';
      ctx.fillRect(bx, padT, bw, plotH);
      ctx.strokeStyle = ph.color + '30';
      ctx.lineWidth = 1; ctx.setLineDash([]);
      ctx.strokeRect(bx, padT, bw, plotH);
    }
  });

  // ─ x axis labels ─
  db.phases.forEach((ph, i) => {
    const x = padL + plotW * i / (n - 1);
    ctx.fillStyle = ph.id === currentPhaseId ? ph.color : 'rgba(255,255,255,0.25)';
    ctx.font = ph.id === currentPhaseId
      ? '500 10px "Shippori Mincho B1"'
      : '10px "Shippori Mincho B1"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(ph.name, x, padT + plotH + 6);
    // tick
    ctx.beginPath(); ctx.moveTo(x, padT + plotH); ctx.lineTo(x, padT + plotH + 4);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.setLineDash([]); ctx.stroke();
  });

  // ─ helper: draw line ─
  const drawLine = (vals, col, dash = [], lw = 2) => {
    ctx.beginPath();
    vals.forEach((v, i) => {
      const x = padL + plotW * i / (n - 1);
      const y = padT + plotH * (1 - v / 100);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = col; ctx.lineWidth = lw;
    ctx.setLineDash(dash); ctx.stroke();
    ctx.setLineDash([]);
  };

  // ─ area fill (anzu) ─
  ctx.beginPath();
  db.phases.forEach((ph, i) => {
    const x = padL + plotW * i / (n - 1);
    const y = padT + plotH * (1 - ph.anzu_temp / 100);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(padL + plotW, padT + plotH);
  ctx.lineTo(padL, padT + plotH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(224,144,144,0.06)'; ctx.fill();

  // ─ lines ─
  drawLine(db.phases.map(p => p.tension),   'rgba(200,120,88,0.7)', [5, 4], 1.5);
  drawLine(db.phases.map(p => p.kuri_temp), '#82aad8', [], 2);
  drawLine(db.phases.map(p => p.anzu_temp), '#e09090', [], 2.5);

  // ─ flag diamonds ─
  canvas._flagHits = [];
  db.flags.forEach(fl => {
    db.phases.forEach((ph, pi) => {
      if (!ph.flags_active.includes(fl.id)) return;
      const x = padL + plotW * pi / (n - 1);
      const y = padT + 8 + (fl.id % 4) * 10;
      const col = fl.resolved ? '#3a4560' : '#d4b84a';
      ctx.beginPath();
      ctx.moveTo(x, y - 5); ctx.lineTo(x + 5, y);
      ctx.lineTo(x, y + 5); ctx.lineTo(x - 5, y);
      ctx.closePath();
      ctx.fillStyle = col + 'bb'; ctx.fill();
      ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.stroke();
      canvas._flagHits.push({ x, y, r: 7, fl, ph });
    });
  });

  // ─ dots on lines ─
  canvas._phaseHits = [];
  db.phases.forEach((ph, i) => {
    const x = padL + plotW * i / (n - 1);
    const yt = padT + plotH * (1 - ph.tension / 100);
    const ya = padT + plotH * (1 - ph.anzu_temp / 100);
    const yk = padT + plotH * (1 - ph.kuri_temp / 100);

    [[ya, '#e09090'], [yk, '#82aad8'], [yt, '#c87858']].forEach(([y, col], li) => {
      const isActive = ph.id === currentPhaseId;
      ctx.beginPath(); ctx.arc(x, y, isActive ? 5 : 3.5, 0, Math.PI * 2);
      ctx.fillStyle = isActive ? col : col + '99';
      ctx.fill();
      if (isActive) {
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
      }
    });

    canvas._phaseHits.push({ x, y: ya, r: 18, ph });
  });

  // events
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    const fh = canvas._flagHits && canvas._flagHits.find(h => Math.hypot(mx-h.x,my-h.y) < h.r);
    if (fh) { editFlag(fh.fl.id); return; }
    const ph = canvas._phaseHits.find(h => Math.hypot(mx-h.x,my-h.y) < h.r);
    if (ph) { selectPhase(ph.ph.id); return; }
    // click nearest phase by x
    const padL2 = 44, plotW2 = W - padL2 - 24;
    const idx = Math.round((mx - padL2) / plotW2 * (n - 1));
    if (idx >= 0 && idx < n) selectPhase(db.phases[idx].id);
  };
}

function editFlag(id) {
  const f = db.flags.find(x => x.id === id);
  if (!f) return;
  const html = `
    <div class="field"><label class="flabel">フラグ名</label><input class="fi" id="ef-name" value="${f.name}"></div>
    <div class="field"><label class="flabel">詳細メモ</label><textarea class="fta" id="ef-note" rows="4">${f.note||''}</textarea></div>
    <div class="field"><label class="flabel">重み (0-100)</label><input class="fi" id="ef-w" type="number" min="0" max="100" value="${f.weight}"></div>
    <div class="field"><label class="flabel">状態</label>
      <select class="fs" id="ef-res">
        <option value="0" ${!f.resolved?'selected':''}>未解決</option>
        <option value="1" ${f.resolved?'selected':''}>解決済</option>
      </select>
    </div>`;
  openModal('フラグ: ' + f.name, html, () => {
    f.name     = document.getElementById('ef-name').value;
    f.note     = document.getElementById('ef-note').value;
    f.weight   = parseInt(document.getElementById('ef-w').value) || 0;
    f.resolved = document.getElementById('ef-res').value === '1';
    persist(); renderAll(); closeModal();
  }, () => {
    if (!confirm('削除しますか？')) return;
    db.flags = db.flags.filter(x => x.id !== id);
    db.phases.forEach(p => { p.flags_active = p.flags_active.filter(i => i !== id); });
    persist(); renderAll(); closeModal();
  });
}

function openAddFlag() {
  const html = `
    <div class="field"><label class="flabel">フラグ名</label><input class="fi" id="af-name"></div>
    <div class="field"><label class="flabel">詳細メモ</label><textarea class="fta" id="af-note" rows="3"></textarea></div>
    <div class="field"><label class="flabel">重み (0-100)</label><input class="fi" id="af-w" type="number" min="0" max="100" value="50"></div>`;
  openModal('フラグ追加', html, () => {
    const newF = { id: Date.now(), name: document.getElementById('af-name').value, note: document.getElementById('af-note').value, weight: parseInt(document.getElementById('af-w').value)||50, resolved: false };
    db.flags.push(newF);
    // add to current phase
    const ph = db.phases.find(p => p.id === currentPhaseId);
    if (ph) ph.flags_active.push(newF.id);
    persist(); renderAll(); closeModal();
  });
}

    db.phases.forEach(p => { p.terms_active = p.terms_active.filter(i => i !== id); });
    persist(); renderAll(); closeModal();
  });
}

function openAddTerm() {
  const html = `
    <div class="field"><label class="flabel">用語名</label><input class="fi" id="at-name"></div>
    <div class="field"><label class="flabel">説明</label><textarea class="fta" id="at-desc" rows="4"></textarea></div>`;
  openModal('用語追加', html, () => {
    const newT = { id: Date.now(), name: document.getElementById('at-name').value, desc: document.getElementById('at-desc').value };
    db.terms.push(newT);
    const ph = db.phases.find(p => p.id === currentPhaseId);
    if (ph) ph.terms_active.push(newT.id);
    persist(); renderAll(); closeModal();
  });
}

// ── ERROR EDIT ──
function editError(id) {
  const e = db.errors.find(x => x.id === id);
  if (!e) return;
  const html = `
    <div class="field"><label class="flabel">フェーズ・場所</label><input class="fi" id="ee-phase" value="${e.phase}"></div>
    <div class="field"><label class="flabel">内容</label><textarea class="fta" id="ee-content" rows="4">${e.content}</textarea></div>
    <div class="field"><label class="flabel">状態</label>
      <select class="fs" id="ee-res">
        <option value="0" ${!e.resolved?'selected':''}>未解決</option>
        <option value="1" ${e.resolved?'selected':''}>解決済</option>
      </select></div>`;
  openModal('エラーメモ編集', html, () => {
    e.phase    = document.getElementById('ee-phase').value;
    e.content  = document.getElementById('ee-content').value;
    e.resolved = document.getElementById('ee-res').value === '1';
    persist(); renderAll(); closeModal();
  }, () => {
    if (!confirm('削除しますか？')) return;
    db.errors = db.errors.filter(x => x.id !== id);
    persist(); renderAll(); closeModal();
  });
}

function openAddError() {
  const ph = db.phases.find(p => p.id === currentPhaseId);
  const html = `
    <div class="field"><label class="flabel">フェーズ・場所</label><input class="fi" id="ae-phase" value="${ph ? ph.name : ''}"></div>
    <div class="field"><label class="flabel">内容</label><textarea class="fta" id="ae-content" rows="4"></textarea></div>`;
  openModal('エラーメモ追加', html, () => {
    db.errors.push({ id: Date.now(), phase: document.getElementById('ae-phase').value, content: document.getElementById('ae-content').value, resolved: false });
    persist(); renderAll(); closeModal();
  });
}

// ══════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ══════════════════════════════════════════════════════════
function exportJSON() {
  const b = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'rod-story-nav.json'; a.click();
}
function importJSON() { document.getElementById('json-input').click(); }
function loadJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try { db = JSON.parse(ev.target.result); persist(); renderAll(); } catch(err) { alert('読み込み失敗'); }
  };
  r.readAsText(f);
}
function saveHTML() {
  const html = document.documentElement.outerHTML;
  const dbStr = JSON.stringify(db);
  const out = html.replace(/let db = \{[\s\S]*?\};(?=\s*\/\/ ──)/, `let db = ${dbStr};`);
  const b = new Blob([out], { type: 'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'ロッド物語_StoryNavigator_' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
}
</script>
