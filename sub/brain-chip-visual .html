<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脳 × 半導体 × 社会 — 普遍構造視覚類推図</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080D;
    --surface: #0D1018;
    --bio: #50E3C2;
    --chip: #FF7849;
    --link: #A78BFA;
    --text: #E2E0D8;
    --muted: #555C6E;
    --border: #1E2330;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle dot grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 1;
    padding: 40px 20px 60px;
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 12px;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(20px, 3.5vw, 34px);
    font-weight: 300;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  h1 em { font-style: normal; color: var(--bio); }
  h1 em.c { color: var(--chip); }

  .hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .hint span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--link);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ===== Main diagram layout ===== */
  .diagram-wrap {
    position: relative;
    width: 100%;
    margin: 20px auto 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0;
  }

  .panel {
    flex: 0 0 auto;
    width: 340px;
  }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 10px;
    padding: 5px 0;
  }
  .panel-label.bio { color: var(--bio); border-bottom: 1px solid rgba(80,227,194,0.2); }
  .panel-label.chip { color: var(--chip); border-bottom: 1px solid rgba(255,120,73,0.2); }

  /* SVG containers */
  .svg-wrap {
    position: relative;
    width: 340px;
    height: 480px;
  }

  /* Connection canvas - middle */
  .conn-wrap {
    flex: 1;
    position: relative;
    height: 480px;
    min-width: 180px;
    max-width: 260px;
    margin-top: 36px; /* offset for panel-label */
  }

  #conn-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Hotspot circles on diagrams */
  .hotspot {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: all 0.2s;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }

  .hotspot::after {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    transition: transform 0.2s;
  }

  .hotspot.bio { border-color: var(--bio); color: var(--bio); background: rgba(80,227,194,0.1); }
  .hotspot.chip { border-color: var(--chip); color: var(--chip); background: rgba(255,120,73,0.1); }

  .hotspot.active {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 16px currentColor;
  }
  .hotspot.bio.active { background: rgba(80,227,194,0.25); }
  .hotspot.chip.active { background: rgba(255,120,73,0.25); }
  .hotspot.dimmed { opacity: 0.2; }

  /* Info panel below */
  .info-panel {
    margin-top: 28px;
    min-height: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .info-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--link);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .info-panel.active::before { opacity: 1; }

  .info-default {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .info-content { display: none; }
  .info-content.active { display: block; }

  /* Top row: brain + chip */
  .info-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 14px;
  }

  .info-side-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .info-side-label.bio { color: var(--bio); }
  .info-side-label.chip { color: var(--chip); }

  .info-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }
  .info-name.bio { color: var(--bio); }
  .info-name.chip { color: var(--chip); }

  .info-desc {
    font-size: 11px;
    line-height: 1.7;
    color: #B0ADA6;
    font-weight: 300;
  }

  .info-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  /* Universal analogy grid: 6 domains */
  .domain-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .domain-card {
    background: rgba(255,255,255,0.025);
    border-radius: 3px;
    padding: 10px 11px;
    border-top: 2px solid;
  }

  .domain-card-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 5px;
    opacity: 0.8;
  }

  .domain-card-name {
    font-size: 11.5px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .domain-card-desc {
    font-size: 10px;
    color: #888480;
    line-height: 1.55;
  }

  /* Category tag */
  .category-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 2px;
    background: rgba(167,139,250,0.12);
    color: var(--link);
    border: 1px solid rgba(167,139,250,0.25);
    margin-bottom: 12px;
  }

  .info-analogy {
    font-size: 11px;
    color: #8B87FF;
    letter-spacing: 0.05em;
    font-style: italic;
    text-align: center;
    padding: 10px;
    background: rgba(167,139,250,0.06);
    border-radius: 3px;
  }

  /* SVG styles */
  .brain-svg, .chip-svg {
    width: 100%;
    height: 100%;
  }

  .category-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    fill: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Connection lines */
  .conn-line {
    fill: none;
    stroke: var(--link);
    stroke-width: 1.5;
    opacity: 0;
    transition: opacity 0.3s;
    stroke-dasharray: 4 3;
  }
  .conn-line.active {
    opacity: 1;
    animation: dash 1.2s linear infinite;
  }
  @keyframes dash {
    to { stroke-dashoffset: -14; }
  }
  .conn-line.secondary {
    stroke: var(--muted);
    stroke-width: 0.5;
    stroke-dasharray: none;
    opacity: 0.15;
    animation: none;
  }

  .legend-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 18px;
    margin-top: 20px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div class="page">
  <header>
    <p class="eyebrow">Interactive Structural Analogy</p>
    <h1><em>脳・神経系</em> と <em class="c">半導体チップ</em> の対応図</h1>
    <p class="hint"><span></span>各部位をクリック → 脳・半導体・身体・貨幣・経済・組織・個人・政府省庁 の8層類推を表示</p>
  </header>

  <div class="diagram-wrap">
    <!-- Brain panel -->
    <div class="panel">
      <div class="panel-label bio">🧠 脳・神経系</div>
      <div class="svg-wrap" id="brain-wrap">
        <svg class="brain-svg" viewBox="0 0 340 480" xmlns="http://www.w3.org/2000/svg">
          <!-- Background glow -->
          <defs>
            <radialGradient id="brainGlow" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stop-color="#50E3C2" stop-opacity="0.06"/>
              <stop offset="100%" stop-color="#50E3C2" stop-opacity="0"/>
            </radialGradient>
            <filter id="glow-bio">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <ellipse cx="170" cy="210" rx="145" ry="175" fill="url(#brainGlow)"/>

          <!-- Skull outline (very subtle) -->
          <ellipse cx="170" cy="195" rx="130" ry="155" fill="none" stroke="#1E2330" stroke-width="1"/>

          <!-- BRAIN STEM (bottom) -->
          <rect x="148" y="330" width="44" height="70" rx="8" fill="#0D1622" stroke="#1E3040" stroke-width="1.5"/>
          <line x1="158" y1="340" x2="158" y2="390" stroke="#1A3045" stroke-width="1"/>
          <line x1="170" y1="338" x2="170" y2="395" stroke="#1A3045" stroke-width="1"/>
          <line x1="182" y1="340" x2="182" y2="390" stroke="#1A3045" stroke-width="1"/>
          <text x="170" y="415" text-anchor="middle" class="category-badge" font-size="8" fill="#3A4555">脳幹</text>

          <!-- CEREBELLUM (back/bottom) -->
          <ellipse cx="170" cy="295" rx="55" ry="38" fill="#0D1822" stroke="#1E3040" stroke-width="1.5"/>
          <!-- Cerebellum folds -->
          <path d="M120 292 Q135 280 150 292 Q165 304 180 292 Q195 280 210 292 Q220 298 220 298" fill="none" stroke="#253545" stroke-width="1.2"/>
          <path d="M122 300 Q137 288 152 300 Q167 312 182 300 Q197 288 212 300" fill="none" stroke="#253545" stroke-width="1"/>
          <text x="170" y="317" text-anchor="middle" class="category-badge" font-size="8" fill="#3A4555">小脳</text>

          <!-- THALAMUS (center) -->
          <ellipse cx="170" cy="225" rx="32" ry="22" fill="#0E1B25" stroke="#1E3545" stroke-width="1.5"/>
          <ellipse cx="170" cy="225" rx="18" ry="12" fill="#112030" stroke="#253D50" stroke-width="1"/>
          <text x="170" y="248" text-anchor="middle" class="category-badge" font-size="8" fill="#3A5060">視床</text>

          <!-- AMYGDALA (left temporal) -->
          <ellipse cx="105" cy="240" rx="20" ry="15" fill="#0E1A20" stroke="#1E3040" stroke-width="1.5"/>
          <text x="105" y="263" text-anchor="middle" class="category-badge" font-size="8" fill="#3A4555">扁桃体</text>

          <!-- HIPPOCAMPUS (curved, temporal) -->
          <path d="M108 200 Q90 215 88 235 Q88 255 100 260" fill="none" stroke="#253D55" stroke-width="3" stroke-linecap="round"/>
          <path d="M108 200 Q92 213 90 233 Q90 253 102 258" fill="none" stroke="#1A2E42" stroke-width="1.5" stroke-linecap="round"/>
          <text x="72" y="230" text-anchor="middle" class="category-badge" font-size="8" fill="#3A4555">海馬</text>

          <!-- WHITE MATTER bands -->
          <path d="M120 170 Q170 155 220 170" fill="none" stroke="#1A2E3E" stroke-width="4" stroke-linecap="round"/>
          <path d="M115 185 Q170 168 225 185" fill="none" stroke="#1A2E3E" stroke-width="3" stroke-linecap="round"/>
          <text x="170" y="152" text-anchor="middle" class="category-badge" font-size="8" fill="#3A4555">白質</text>

          <!-- CORTEX regions -->
          <!-- Frontal lobe -->
          <path d="M95 130 Q110 70 170 60 Q200 55 220 80 Q235 100 235 130" fill="none" stroke="#253D55" stroke-width="1"/>
          <!-- Cortex folds (sulci) -->
          <path d="M105 110 Q125 90 145 108 Q165 126 185 108 Q205 90 225 110" fill="none" stroke="#1E3040" stroke-width="1.5"/>
          <path d="M100 135 Q120 112 140 132 Q160 152 180 132 Q200 112 230 130" fill="none" stroke="#1E3040" stroke-width="1.5"/>
          <path d="M98 158 Q118 138 138 155 Q158 172 178 155 Q198 138 228 155" fill="none" stroke="#1E3040" stroke-width="1.2"/>

          <!-- Corpus Callosum (BBB metaphor position) -->
          <path d="M132 175 Q170 165 208 175" fill="none" stroke="#253040" stroke-width="5" stroke-linecap="round"/>
          <path d="M132 175 Q170 165 208 175" fill="none" stroke="#1E2A38" stroke-width="2" stroke-linecap="round"/>
          <text x="170" y="165" text-anchor="middle" class="category-badge" font-size="8" fill="#304555">脳梁</text>

          <!-- NEURON illustration (small, lower left area) -->
          <circle cx="88" cy="310" r="6" fill="none" stroke="#253040" stroke-width="1.2"/>
          <line x1="88" y1="304" x2="88" y2="292" stroke="#1E2E40" stroke-width="1"/>
          <line x1="82" y1="307" x2="70" y2="300" stroke="#1E2E40" stroke-width="1"/>
          <line x1="94" y1="307" x2="106" y2="300" stroke="#1E2E40" stroke-width="1"/>
          <line x1="88" y1="316" x2="88" y2="332" stroke="#1E2E40" stroke-width="1" stroke-dasharray="2 1"/>
          <circle cx="88" cy="336" r="4" fill="none" stroke="#1E2A38" stroke-width="1"/>
          <text x="88" y="348" text-anchor="middle" class="category-badge" font-size="7.5" fill="#304555">ニューロン</text>

          <!-- GLIAL CELL indicator -->
          <circle cx="245" cy="310" r="8" fill="none" stroke="#1E2E40" stroke-width="1.2"/>
          <circle cx="255" cy="320" r="5" fill="none" stroke="#1A2A38" stroke-width="1"/>
          <circle cx="238" cy="320" r="4" fill="none" stroke="#1A2A38" stroke-width="1"/>
          <text x="245" y="338" text-anchor="middle" class="category-badge" font-size="7.5" fill="#304555">グリア細胞</text>

          <!-- BBB indicator -->
          <rect x="125" y="60" width="90" height="14" rx="3" fill="none" stroke="#1E2E40" stroke-width="1" stroke-dasharray="3 2"/>
          <text x="170" y="71" text-anchor="middle" class="category-badge" font-size="7.5" fill="#304555">血液脳関門</text>

          <!-- Synapse indicator (right side) -->
          <circle cx="255" cy="190" r="5" fill="none" stroke="#253040" stroke-width="1.2"/>
          <circle cx="267" cy="200" r="5" fill="none" stroke="#253040" stroke-width="1.2"/>
          <line x1="258" y1="194" x2="264" y2="197" stroke="#1E2E40" stroke-width="1" stroke-dasharray="1.5 1"/>
          <text x="262" y="217" text-anchor="middle" class="category-badge" font-size="7.5" fill="#304555">シナプス</text>

          <!-- Axon -->
          <path d="M255 230 Q268 240 268 260 Q268 275 258 280" fill="none" stroke="#1E2E40" stroke-width="2" stroke-linecap="round"/>
          <text x="278" y="255" text-anchor="middle" class="category-badge" font-size="7.5" fill="#304555">軸索</text>

          <!-- Energy/blood vessel -->
          <path d="M140 380 Q145 370 150 380 Q155 390 160 380 Q165 370 170 380" fill="none" stroke="#1E2E40" stroke-width="1.5" stroke-linecap="round"/>
          <text x="155" y="400" text-anchor="middle" class="category-badge" font-size="7.5" fill="#304555">脳血管</text>

          <!-- CORTEX label -->
          <text x="170" y="92" text-anchor="middle" font-family="'Space Mono',monospace" font-size="9" fill="#406080" letter-spacing="2">大脳皮質</text>
        </svg>

        <!-- Hotspots on brain -->
        <div class="hotspot bio" id="b-cortex"    style="left:50%;top:20%"   data-id="cortex"    title="大脳皮質"></div>
        <div class="hotspot bio" id="b-cerebellum" style="left:50%;top:62%"  data-id="cerebellum" title="小脳"></div>
        <div class="hotspot bio" id="b-brainstem"  style="left:50%;top:77%"  data-id="brainstem"  title="脳幹"></div>
        <div class="hotspot bio" id="b-thalamus"   style="left:50%;top:47%"  data-id="thalamus"   title="視床"></div>
        <div class="hotspot bio" id="b-hippocampus" style="left:26%;top:43%" data-id="hippocampus" title="海馬"></div>
        <div class="hotspot bio" id="b-amygdala"   style="left:31%;top:50%"  data-id="amygdala"   title="扁桃体"></div>
        <div class="hotspot bio" id="b-synapse"    style="left:79%;top:39%"  data-id="synapse"    title="シナプス"></div>
        <div class="hotspot bio" id="b-axon"       style="left:79%;top:55%"  data-id="axon"       title="軸索"></div>
        <div class="hotspot bio" id="b-whitemap"   style="left:50%;top:33%"  data-id="whitematter" title="白質"></div>
        <div class="hotspot bio" id="b-glia"       style="left:72%;top:66%"  data-id="glia"       title="グリア細胞"></div>
        <div class="hotspot bio" id="b-bbb"        style="left:50%;top:13%"  data-id="bbb"        title="血液脳関門"></div>
        <div class="hotspot bio" id="b-neuron"     style="left:26%;top:65%"  data-id="neuron"     title="ニューロン"></div>
        <div class="hotspot bio" id="b-vessel"     style="left:46%;top:86%"  data-id="vessel"     title="脳血管"></div>
      </div>
    </div>

    <!-- Connection lines canvas -->
    <div class="conn-wrap" id="conn-wrap">
      <svg id="conn-svg" viewBox="0 0 200 480" preserveAspectRatio="none">
        <!-- Static faint lines (all pairs) -->
      </svg>
    </div>

    <!-- Chip panel -->
    <div class="panel">
      <div class="panel-label chip">⚡ 半導体チップ</div>
      <div class="svg-wrap" id="chip-wrap">
        <svg class="chip-svg" viewBox="0 0 340 480" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="chipGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#FF7849" stop-opacity="0.07"/>
              <stop offset="100%" stop-color="#FF7849" stop-opacity="0"/>
            </radialGradient>
            <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
              <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#151C28" stroke-width="0.5"/>
            </pattern>
          </defs>

          <!-- Chip background -->
          <rect x="55" y="40" width="230" height="380" rx="6" fill="url(#chipGlow)"/>
          <rect x="55" y="40" width="230" height="380" rx="6" fill="url(#grid)" opacity="0.5"/>
          <rect x="55" y="40" width="230" height="380" rx="6" fill="none" stroke="#1E2835" stroke-width="1.5"/>

          <!-- Chip pins left -->
          <g stroke="#1A2535" stroke-width="1.5" stroke-linecap="round">
            <line x1="30" y1="80"  x2="55" y2="80"/><line x1="30" y1="100" x2="55" y2="100"/>
            <line x1="30" y1="120" x2="55" y2="120"/><line x1="30" y1="140" x2="55" y2="140"/>
            <line x1="30" y1="160" x2="55" y2="160"/><line x1="30" y1="180" x2="55" y2="180"/>
            <line x1="30" y1="200" x2="55" y2="200"/><line x1="30" y1="220" x2="55" y2="220"/>
            <line x1="30" y1="240" x2="55" y2="240"/><line x1="30" y1="260" x2="55" y2="260"/>
            <line x1="30" y1="280" x2="55" y2="280"/><line x1="30" y1="300" x2="55" y2="300"/>
            <line x1="30" y1="320" x2="55" y2="320"/><line x1="30" y1="340" x2="55" y2="340"/>
            <line x1="30" y1="360" x2="55" y2="360"/><line x1="30" y1="380" x2="55" y2="380"/>
          </g>
          <!-- Chip pins right -->
          <g stroke="#1A2535" stroke-width="1.5" stroke-linecap="round">
            <line x1="285" y1="80"  x2="310" y2="80"/><line x1="285" y1="100" x2="310" y2="100"/>
            <line x1="285" y1="120" x2="310" y2="120"/><line x1="285" y1="140" x2="310" y2="140"/>
            <line x1="285" y1="160" x2="310" y2="160"/><line x1="285" y1="180" x2="310" y2="180"/>
            <line x1="285" y1="200" x2="310" y2="200"/><line x1="285" y1="220" x2="310" y2="220"/>
            <line x1="285" y1="240" x2="310" y2="240"/><line x1="285" y1="260" x2="310" y2="260"/>
            <line x1="285" y1="280" x2="310" y2="280"/><line x1="285" y1="300" x2="310" y2="300"/>
            <line x1="285" y1="320" x2="310" y2="320"/><line x1="285" y1="340" x2="310" y2="340"/>
            <line x1="285" y1="360" x2="310" y2="360"/><line x1="285" y1="380" x2="310" y2="380"/>

let activeId = null;

function getBrainHotspotY(id) {
  const map = {
    cortex: 0.20, cerebellum: 0.62, brainstem: 0.77, thalamus: 0.47,
    hippocampus: 0.43, amygdala: 0.50, synapse: 0.39, axon: 0.55,
    whitematter: 0.33, glia: 0.66, bbb: 0.13, neuron: 0.65, vessel: 0.86
  };
  return (map[id] || 0.5) * 480;
}

function getChipHotspotY(id) {
  const map = {
    cortex: 0.20, cerebellum: 0.20, brainstem: 0.85, thalamus: 0.72,
    hippocampus: 0.37, amygdala: 0.66, synapse: 0.52, axon: 0.33,
    whitematter: 0.72, glia: 0.85, bbb: 0.85, neuron: 0.63, vessel: 0.96
  };
  return (map[id] || 0.5) * 480;
}

function renderConnections(activeId) {
  const svg = document.getElementById('conn-svg');
  svg.innerHTML = '';

  // Draw all secondary lines first
  Object.keys(data).forEach(id => {
    const by = getBrainHotspotY(id);
    const cy = getChipHotspotY(id);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const mx = 100;
    line.setAttribute('d', `M 0 ${by} C ${mx} ${by} ${mx} ${cy} 200 ${cy}`);
    line.setAttribute('class', 'conn-line secondary');
    svg.appendChild(line);
  });

  // Draw active line on top
  if (activeId) {
    const by = getBrainHotspotY(activeId);
    const cy = getChipHotspotY(activeId);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const mx = 100;
    line.setAttribute('d', `M 0 ${by} C ${mx} ${by} ${mx} ${cy} 200 ${cy}`);
    line.setAttribute('class', 'conn-line active');
    svg.appendChild(line);
  }
}

function activate(id) {
  if (activeId === id) {
    // deactivate
    activeId = null;
    document.querySelectorAll('.hotspot').forEach(h => {
      h.classList.remove('active', 'dimmed');
    });
    document.getElementById('info-default').style.display = 'flex';
    document.getElementById('info-contents').innerHTML = '';
    document.getElementById('info-panel').classList.remove('active');
    renderConnections(null);
    return;
  }

  activeId = id;

  document.querySelectorAll('.hotspot').forEach(h => {
    const hid = h.dataset.id;
    if (hid === id) {
      h.classList.add('active');
      h.classList.remove('dimmed');
    } else {
      h.classList.remove('active');
      h.classList.add('dimmed');
    }
  });

  renderConnections(id);

  const d = data[id];

  const domainCards = [
    { key:'body',   icon:'🏠', label:'身体・衣食住', color:'#E8C84A' },

    { key:'govt',   icon:'🏛️', label:'政府省庁',     color:'#FCA5A5' },

    <div class="domain-card" style="border-top-color:${dom.color}">

        </div>
      </div>
      <div class="info-divider"></div>
      <div class="domain-grid">${domainCards}</div>
      <div class="info-analogy">🔗 普遍類推ポイント：${d.analogy}</div>
    </div>
  `;
}

document.querySelectorAll('.hotspot').forEach(h => {
  h.addEventListener('click', (e) => {
    e.stopPropagation();
    activate(h.dataset.id);
  });
});

// Remove duplicate hotspots (bus/noc and whitematter share same chip hotspot)
// Fix: give whitematter its own unique chip position
document.getElementById('c-bus2').style.display = 'none'; // hide duplicate, use c-noc for both

// Init
renderConnections(null);

// Resize handler
window.addEventListener('resize', () => renderConnections(activeId));
</script>
