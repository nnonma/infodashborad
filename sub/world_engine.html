<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060c;--panel:#0c0c18;--border:#1a1a2e;
  --text:#a0a8b8;--dim:#3a3a58;--bright:#d0d8e8;
  --green:#4a9a6a;--blue:#4a6a9a;--orange:#9a6a3a;--red:#9a3a3a;--purple:#7a4a9a;
}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* レイアウト */
#app{display:grid;grid-template-columns:220px 1fr 200px;grid-template-rows:36px 1fr 120px;height:100vh;gap:1px;background:var(--border)}
#topbar{grid-column:1/4;background:var(--panel);display:flex;align-items:center;padding:0 16px;gap:24px;border-bottom:1px solid var(--border)}
#sidebar{background:var(--panel);padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
#canvas-wrap{background:var(--bg);position:relative;overflow:hidden}
#info-panel{background:var(--panel);padding:12px;overflow-y:auto}
#timeline{grid-column:1/4;background:var(--panel);border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px}

canvas{display:block;width:100%;height:100%}

/* topbar */
.tb-title{color:var(--bright);letter-spacing:0.2em;font-size:11px}
.tb-badge{background:var(--border);padding:2px 8px;font-size:9px;color:var(--dim);letter-spacing:0.1em}
.tb-time{margin-left:auto;color:var(--dim);font-size:10px}
#play-btn{background:none;border:1px solid var(--green);color:var(--green);padding:3px 10px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:0.1em}
#play-btn:hover{background:var(--green);color:var(--bg)}

/* sidebar */
.section-label{font-size:9px;color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;margin-top:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.slider-row{display:flex;flex-direction:column;gap:3px;margin-bottom:2px}
.slider-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text)}
.slider-label span{color:var(--bright)}
input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--text);border-radius:50%}

.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.toggle-label{font-size:10px;color:var(--text)}
.toggle{width:28px;height:14px;background:var(--border);border-radius:7px;position:relative;cursor:pointer;transition:background 0.2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:10px;height:10px;background:var(--bright);border-radius:50%;top:2px;left:2px;transition:left 0.2s}
.toggle.on::after{left:16px}

/* info panel */
.info-title{font-size:9px;color:var(--dim);letter-spacing:0.2em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.info-item{margin-bottom:6px}
.info-key{font-size:9px;color:var(--dim);margin-bottom:1px}
.info-val{font-size:11px;color:var(--bright)}
.info-bar{height:3px;background:var(--border);margin-top:3px;position:relative}
.info-bar-fill{height:100%;background:var(--green);transition:width 0.3s}

/* timeline */
.tl-label{font-size:9px;color:var(--dim);letter-spacing:0.15em;white-space:nowrap}
#tl-slider{flex:1;height:3px;-webkit-appearance:none;background:var(--border);cursor:pointer}
#tl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--orange);border-radius:50%}
.tl-epoch{font-size:10px;color:var(--orange)}
.speed-btn{background:none;border:1px solid var(--dim);color:var(--dim);padding:2px 8px;cursor:pointer;font-family:inherit;font-size:10px}
.speed-btn.active{border-color:var(--orange);color:var(--orange)}

/* scale indicator */
#scale-hud{position:absolute;bottom:12px;left:12px;font-size:10px;color:var(--dim);letter-spacing:0.1em;pointer-events:none}
#cursor-hud{position:absolute;top:12px;right:12px;font-size:10px;color:var(--dim);letter-spacing:0.1em;pointer-events:none;text-align:right}
</style>
</head>
<body>
<div id="app">
  <!-- topbar -->
  <div id="topbar">
    <div class="tb-title">WORLD ENGINE</div>
    <div class="tb-badge">自然 × 人間 × 情報</div>
    <div class="tb-badge" id="node-count">nodes: 0</div>
    <div class="tb-badge" id="edge-count">edges: 0</div>
    <button id="play-btn">▶ RUN</button>
    <div class="tb-time" id="tb-time">t = 0.000</div>
  </div>

  <!-- sidebar: controls -->
  <div id="sidebar">
    <div class="section-label">スケール</div>
    <div class="slider-row">
      <div class="slider-label">量子／分子 <span id="v-micro">50</span></div>
      <input type="range" id="s-micro" min="0" max="100" value="50">
    </div>
    <div class="slider-row">
      <div class="slider-label">生物／個体 <span id="v-bio">50</span></div>
      <input type="range" id="s-bio" min="0" max="100" value="50">
    </div>
    <div class="slider-row">
      <div class="slider-label">社会／文明 <span id="v-social">50</span></div>
      <input type="range" id="s-social" min="0" max="100" value="50">
    </div>
    <div class="slider-row">
      <div class="slider-label">情報／AI <span id="v-info">50</span></div>
      <input type="range" id="s-info" min="0" max="100" value="50">
    </div>

    <div class="section-label">動力学</div>
    <div class="slider-row">
      <div class="slider-label">エントロピー <span id="v-entropy">30</span></div>
      <input type="range" id="s-entropy" min="0" max="100" value="30">
    </div>
    <div class="slider-row">
      <div class="slider-label">欲求強度 <span id="v-desire">60</span></div>
      <input type="range" id="s-desire" min="0" max="100" value="60">
    </div>
    <div class="slider-row">
      <div class="slider-label">接続密度 <span id="v-connect">40</span></div>
      <input type="range" id="s-connect" min="0" max="100" value="40">
    </div>

    <div class="section-label">レイヤー表示</div>
    <div class="toggle-row"><span class="toggle-label">自然系</span><div class="toggle on" id="t-nature"></div></div>
    <div class="toggle-row"><span class="toggle-label">生命系</span><div class="toggle on" id="t-life"></div></div>
    <div class="toggle-row"><span class="toggle-label">社会系</span><div class="toggle on" id="t-society"></div></div>
    <div class="toggle-row"><span class="toggle-label">情報系</span><div class="toggle on" id="t-digital"></div></div>
    <div class="toggle-row"><span class="toggle-label">エロス流</span><div class="toggle on" id="t-eros"></div></div>
  </div>

  <!-- main canvas -->
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="scale-hud">SCALE: <span id="scale-val">1.0x</span></div>
    <div id="cursor-hud" id="cursor-hud">hover a node</div>
  </div>

  <!-- info panel -->
  <div id="info-panel">
    <div class="info-title">NODE INSPECTOR</div>
    <div id="inspector-content">
      <div style="color:var(--dim);font-size:10px;line-height:1.8">
        ノードにホバーすると<br>詳細が表示される
      </div>
    </div>
    <div class="info-title" style="margin-top:16px">システム状態</div>
    <div class="info-item">
      <div class="info-key">差分検出率</div>
      <div class="info-val" id="stat-delta">—</div>
      <div class="info-bar"><div class="info-bar-fill" id="bar-delta" style="width:0%"></div></div>
    </div>
    <div class="info-item">
      <div class="info-key">応答伝播速度</div>
      <div class="info-val" id="stat-response">—</div>
      <div class="info-bar"><div class="info-bar-fill" id="bar-response" style="width:0%;background:#4a6a9a"></div></div>
    </div>
    <div class="info-item">
      <div class="info-key">エロス共鳴</div>
      <div class="info-val" id="stat-eros">—</div>
      <div class="info-bar"><div class="info-bar-fill" id="bar-eros" style="width:0%;background:#7a4a9a"></div></div>
    </div>
    <div class="info-item">
      <div class="info-key">情報圧縮率</div>
      <div class="info-val" id="stat-compress">—</div>
      <div class="info-bar"><div class="info-bar-fill" id="bar-compress" style="width:0%;background:#9a6a3a"></div></div>
    </div>
  </div>

  <!-- timeline -->
  <div id="timeline">
    <div class="tl-label">TIME</div>
    <input type="range" id="tl-slider" min="0" max="1000" value="0">
    <div class="tl-epoch" id="tl-epoch">原初</div>
    <div class="tl-label">SPEED</div>
    <button class="speed-btn" data-speed="0.5">×0.5</button>
    <button class="speed-btn active" data-speed="1">×1</button>
    <button class="speed-btn" data-speed="3">×3</button>
    <button class="speed-btn" data-speed="10">×10</button>
    <div class="tl-label" style="margin-left:auto">ZOOM</div>
    <button class="speed-btn" id="zoom-out">－</button>
    <button class="speed-btn" id="zoom-in">＋</button>
    <button class="speed-btn" id="zoom-reset">1:1</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

// 状態
let running = false;
let t = 0;
let speed = 1;
let zoom = 1;
let panX = 0, panY = 0;
let dragging = false, dragStart = {x:0,y:0}, panStart = {x:0,y:0};
let mouseX = 0, mouseY = 0;
let hoveredNode = null;
let animId = null;

// パラメータ
const P = {
  micro:50, bio:50, social:50, info:50,
  entropy:30, desire:60, connect:40,
  layers: {nature:true, life:true, society:true, digital:true, eros:true}
};

// ノード定義
const NODE_DEFS = [
  // 自然系
  {id:'quantum', label:'量子', sublabel:'差分の最小単位', layer:'nature', x:0.15, y:0.2, color:'#4a7a9a', size:18},
  {id:'energy',  label:'エネルギー', sublabel:'変換・保存', layer:'nature', x:0.25, y:0.35, color:'#4a7a9a', size:22},
  {id:'entropy_node', label:'エントロピー', sublabel:'常に増大', layer:'nature', x:0.1, y:0.5, color:'#6a4a3a', size:16},
  {id:'spacetime', label:'時空', sublabel:'記述の舞台', layer:'nature', x:0.2, y:0.65, color:'#4a7a9a', size:20},

  // 生命系
  {id:'dna',     label:'DNA', sublabel:'記述コード', layer:'life', x:0.4, y:0.15, color:'#4a9a6a', size:20},
  {id:'cell',    label:'細胞', sublabel:'最小生命単位', layer:'life', x:0.35, y:0.3, color:'#4a9a6a', size:18},
  {id:'hormone', label:'ホルモン', sublabel:'oxytocin/serotonin', layer:'life', x:0.5, y:0.25, color:'#7a9a4a', size:24},
  {id:'nerve',   label:'神経網', sublabel:'差分検出器', layer:'life', x:0.45, y:0.45, color:'#4a9a6a', size:26},
  {id:'body',    label:'身体', sublabel:'肉としての人間', layer:'life', x:0.35, y:0.6, color:'#9a7a4a', size:28},

  // 社会系
  {id:'desire',  label:'欲求', sublabel:'approach/withdraw', layer:'society', x:0.62, y:0.2, color:'#9a4a7a', size:24},
  {id:'other',   label:'他者', sublabel:'人的エージェント', layer:'society', x:0.72, y:0.35, color:'#7a4a9a', size:22},
  {id:'culture', label:'文化', sublabel:'虚構の共有', layer:'society', x:0.6, y:0.5, color:'#7a6a4a', size:20},
  {id:'market',  label:'市場', sublabel:'インセンティブ構造', layer:'society', x:0.75, y:0.55, color:'#9a6a3a', size:22},
  {id:'narrative',label:'物語', sublabel:'分離・試練・帰還', layer:'society', x:0.55, y:0.65, color:'#7a4a9a', size:18},

  // 情報系
  {id:'llm',     label:'LLM', sublabel:'AIエージェント', layer:'digital', x:0.85, y:0.2, color:'#3a7a9a', size:26},
  {id:'vr',      label:'仮想空間', sublabel:'VRChat/3D', layer:'digital', x:0.88, y:0.45, color:'#3a7a9a', size:20},
  {id:'data',    label:'データ', sublabel:'一次情報', layer:'digital', x:0.82, y:0.65, color:'#4a6a8a', size:18},

  // エロス（中央）
  {id:'eros',    label:'エロス', sublabel:'共鳴・気持ちよさ', layer:'eros', x:0.5, y:0.5, color:'#9a4a9a', size:34},
];

// エッジ定義
const EDGE_DEFS = [
  // 自然→生命
  {from:'energy', to:'dna', weight:0.8},
  {from:'quantum', to:'cell', weight:0.6},
  {from:'entropy_node', to:'body', weight:0.7},
  {from:'spacetime', to:'nerve', weight:0.5},

  // 生命→社会
  {from:'hormone', to:'desire', weight:0.9},
  {from:'nerve', to:'desire', weight:0.8},
  {from:'body', to:'other', weight:0.7},
  {from:'dna', to:'culture', weight:0.5},
  {from:'hormone', to:'narrative', weight:0.6},

  // 社会→情報
  {from:'culture', to:'llm', weight:0.7},
  {from:'market', to:'data', weight:0.8},
  {from:'narrative', to:'llm', weight:0.6},
  {from:'other', to:'vr', weight:0.7},

  // → エロス
  {from:'hormone', to:'eros', weight:1.0, eros:true},
  {from:'desire', to:'eros', weight:1.0, eros:true},
  {from:'body', to:'eros', weight:0.9, eros:true},
  {from:'other', to:'eros', weight:0.8, eros:true},
  {from:'narrative', to:'eros', weight:0.7, eros:true},
  {from:'vr', to:'eros', weight:0.6, eros:true},

  // フィードバック
  {from:'eros', to:'nerve', weight:0.8, feedback:true},
  {from:'llm', to:'culture', weight:0.7},
  {from:'data', to:'dna', weight:0.4},
  {from:'market', to:'desire', weight:0.6},
];

let nodes = [];
let edges = [];
let pulses = [];

function initGraph() {
  const W = canvas.width, H = canvas.height;
  nodes = NODE_DEFS.map(d => ({
    ...d,
    cx: d.x * W, cy: d.y * H,
    vx:0, vy:0,
    pulse:0, activity:Math.random(),
    baseX: d.x * W, baseY: d.y * H
  }));
  edges = EDGE_DEFS.map(e => ({
    ...e,
    fromNode: nodes.find(n=>n.id===e.from),
    toNode:   nodes.find(n=>n.id===e.to),
    flow: 0
  }));
}

function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  initGraph();
}

// 描画
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  ctx.save();
  ctx.translate(panX + W/2, panY + H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-W/2, -H/2);

  // グリッド
  ctx.strokeStyle = '#0e0e1a';
  ctx.lineWidth = 1;
  const gs = 60;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // エッジ
  edges.forEach(e => {
    if(!e.fromNode||!e.toNode) return;
    const layerOn = checkLayerEdge(e);
    if(!layerOn) return;

    const alpha = 0.15 + e.flow * 0.5;
    let color = '#3a3a5a';
    if(e.eros && P.layers.eros) color = '#7a3a7a';
    if(e.feedback) color = '#4a6a3a';

    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 1 + e.flow * 2;
    ctx.beginPath();
    ctx.moveTo(e.fromNode.cx, e.fromNode.cy);

    // 曲線
    const mx = (e.fromNode.cx + e.toNode.cx)/2 + (Math.random()-0.5)*20;
    const my = (e.fromNode.cy + e.toNode.cy)/2 + (Math.random()-0.5)*20;
    ctx.quadraticCurveTo(mx, my, e.toNode.cx, e.toNode.cy);
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // パルス粒子
  pulses.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // ノード
  nodes.forEach(n => {
    if(!P.layers[n.layer]) return;
    const r = n.size * (0.8 + n.activity * 0.4);
    const pulse = n.pulse;

    // 発光リング
    if(pulse > 0.1) {
      const grd = ctx.createRadialGradient(n.cx, n.cy, r*0.5, n.cx, n.cy, r*2.5);
      grd.addColorStop(0, n.color + Math.floor(pulse*80).toString(16).padStart(2,'0'));
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(n.cx, n.cy, r*2.5, 0, Math.PI*2);
      ctx.fill();
    }

    // ホバーリング
    if(n === hoveredNode) {
      ctx.strokeStyle = '#ffffff44';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(n.cx, n.cy, r + 8, 0, Math.PI*2);
      ctx.stroke();
    }

    // 本体
    const g = ctx.createRadialGradient(n.cx-r*0.3, n.cy-r*0.3, 0, n.cx, n.cy, r);
    g.addColorStop(0, lighten(n.color, 40));
    g.addColorStop(1, n.color);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.cx, n.cy, r, 0, Math.PI*2);
    ctx.fill();

    // ラベル
    ctx.fillStyle = '#d0d8e8cc';
    ctx.font = `${Math.max(9, r*0.55)}px "Share Tech Mono"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, n.cx, n.cy);

    ctx.fillStyle = '#6a6a8a';
    ctx.font = `${Math.max(7, r*0.38)}px "Share Tech Mono"`;
    ctx.fillText(n.sublabel, n.cx, n.cy + r + 10);
  });

  ctx.restore();
}

function checkLayerEdge(e) {
  const fl = e.fromNode?.layer, tl = e.toNode?.layer;
  if(e.eros) return P.layers.eros;
  return P.layers[fl] || P.layers[tl];
}

function lighten(hex, amt) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.min(255,(n>>16)+amt);
  const g = Math.min(255,((n>>8)&0xff)+amt);
  const b = Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

// シミュレーション更新
function update(dt) {
  t += dt * speed;
  const entropy = P.entropy / 100;
  const desire = P.desire / 100;
  const connect = P.connect / 100;

  // ノードのアクティビティ更新
  nodes.forEach(n => {
    const freq = {
      nature: 0.3, life: 0.8, society: 0.5, digital: 1.2, eros: 0.6
    }[n.layer] || 0.5;
    n.activity = 0.5 + 0.4 * Math.sin(t * freq + n.baseX * 0.01);
    n.pulse = Math.max(0, n.pulse - dt * 2);

    // ゆらぎ
    n.cx = n.baseX + Math.sin(t * 0.4 + n.baseY) * 8 * entropy;
    n.cy = n.baseY + Math.cos(t * 0.3 + n.baseX) * 8 * entropy;
  });

  // エッジフロー更新
  edges.forEach(e => {
    if(!e.fromNode||!e.toNode) return;
    const target = e.weight * connect * (e.eros ? desire : 1);
    e.flow += (target - e.flow) * dt * 2;

    // パルス生成
    if(Math.random() < e.flow * dt * 8 && P.layers[e.fromNode.layer]) {
      const color = e.eros ? '#cc66cc' : (e.feedback ? '#66cc66' : '#6688aa');
      pulses.push({
        edge: e,
        progress: 0,
        color,
        life: 1,
        speed: 0.4 + Math.random() * 0.4
      });
      e.fromNode.pulse = Math.min(1, e.fromNode.pulse + 0.3);
    }
  });

  // パルス移動
  pulses = pulses.filter(p => {
    p.progress += p.speed * dt;
    p.life = 1 - p.progress;
    if(p.progress >= 1) {
      p.edge.toNode.pulse = Math.min(1, p.edge.toNode.pulse + 0.4);
      return false;
    }
    const e = p.edge;
    p.x = e.fromNode.cx + (e.toNode.cx - e.fromNode.cx) * p.progress;
    p.y = e.fromNode.cy + (e.toNode.cy - e.fromNode.cy) * p.progress;
    return true;
  });

  // エロスノードの特別処理
  const erosNode = nodes.find(n=>n.id==='eros');
  if(erosNode) {
    erosNode.activity = 0.5 + 0.45 * Math.sin(t * 0.7) * desire;
  }

  // UI更新
  const delta = 40 + Math.sin(t*1.1)*30;
  const resp = 50 + Math.sin(t*0.7+1)*30;
  const erosVal = 30 + desire*50 + Math.sin(t*0.9)*15;
  const comp = 60 + Math.sin(t*0.5)*20;

  document.getElementById('stat-delta').textContent = delta.toFixed(1) + '%';
  document.getElementById('bar-delta').style.width = delta + '%';
  document.getElementById('stat-response').textContent = resp.toFixed(1) + '%';
  document.getElementById('bar-response').style.width = resp + '%';
  document.getElementById('stat-eros').textContent = erosVal.toFixed(1) + '%';
  document.getElementById('bar-eros').style.width = Math.min(100,erosVal) + '%';
  document.getElementById('stat-compress').textContent = comp.toFixed(1) + '%';
  document.getElementById('bar-compress').style.width = comp + '%';

  document.getElementById('tb-time').textContent = 't = ' + t.toFixed(3);
  document.getElementById('node-count').textContent = 'nodes: ' + nodes.filter(n=>P.layers[n.layer]).length;
  document.getElementById('edge-count').textContent = 'edges: ' + edges.filter(e=>checkLayerEdge(e)).length;

  // タイムライン
  const tl = document.getElementById('tl-slider');
  tl.value = (t * 10) % 1000;
  const epochs = ['原初','物質','生命','意識','文明','情報','AI後'];
  const ei = Math.floor(((t*10)%1000)/143);
  document.getElementById('tl-epoch').textContent = epochs[Math.min(ei,6)];
}

let lastTime = null;
function loop(ts) {
  if(!running) return;
  if(!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  animId = requestAnimationFrame(loop);
}

// コントロール
document.getElementById('play-btn').onclick = function() {
  running = !running;
  this.textContent = running ? '■ STOP' : '▶ RUN';
  this.style.borderColor = running ? '#9a3a3a' : '#4a9a6a';
  this.style.color = running ? '#9a3a3a' : '#4a9a6a';
  if(running) { lastTime = null; animId = requestAnimationFrame(loop); }
  else { if(animId) cancelAnimationFrame(animId); }
};

// スライダー
['micro','bio','social','info','entropy','desire','connect'].forEach(k => {
  const el = document.getElementById('s-'+k);
  const vl = document.getElementById('v-'+k);
  el.oninput = () => { P[k] = +el.value; vl.textContent = el.value; if(!running) draw(); };
});

// トグル
['nature','life','society','digital','eros'].forEach(k => {
  const el = document.getElementById('t-'+k);
  el.onclick = () => {
    P.layers[k] = !P.layers[k];
    el.classList.toggle('on', P.layers[k]);
    if(!running) draw();
  };
});

// スピードボタン
document.querySelectorAll('.speed-btn[data-speed]').forEach(btn => {
  btn.onclick = function() {
    speed = +this.dataset.speed;
    document.querySelectorAll('.speed-btn[data-speed]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
  };
});

// ズーム
document.getElementById('zoom-in').onclick = () => { zoom = Math.min(3, zoom*1.3); updateScaleHud(); if(!running) draw(); };
document.getElementById('zoom-out').onclick = () => { zoom = Math.max(0.3, zoom/1.3); updateScaleHud(); if(!running) draw(); };
document.getElementById('zoom-reset').onclick = () => { zoom=1; panX=0; panY=0; updateScaleHud(); if(!running) draw(); };
function updateScaleHud(){ document.getElementById('scale-val').textContent = zoom.toFixed(2)+'x'; }

// パン
canvas.onmousedown = e => { dragging=true; dragStart={x:e.clientX,y:e.clientY}; panStart={x:panX,y:panY}; };
canvas.onmouseup = () => dragging=false;
canvas.onmouseleave = () => dragging=false;
canvas.onmousemove = e => {
  mouseX = e.offsetX; mouseY = e.offsetY;
  if(dragging) {
    panX = panStart.x + (e.clientX - dragStart.x);
    panY = panStart.y + (e.clientY - dragStart.y);
    if(!running) draw();
  }

  // ホバー検出
  const wx = (mouseX - panX - canvas.width/2) / zoom + canvas.width/2;
  const wy = (mouseY - panY - canvas.height/2) / zoom + canvas.height/2;
  hoveredNode = null;
  for(const n of nodes) {
    if(!P.layers[n.layer]) continue;
    const dx = wx - n.cx, dy = wy - n.cy;
    if(Math.sqrt(dx*dx+dy*dy) < n.size + 8) { hoveredNode = n; break; }
  }

  document.getElementById('cursor-hud').textContent = hoveredNode
    ? `[${hoveredNode.layer}] ${hoveredNode.label}`
    : `${wx.toFixed(0)}, ${wy.toFixed(0)}`;

  if(hoveredNode) {
    const incoming = edges.filter(e=>e.toNode===hoveredNode&&checkLayerEdge(e));
    const outgoing = edges.filter(e=>e.fromNode===hoveredNode&&checkLayerEdge(e));
    document.getElementById('inspector-content').innerHTML = `
      <div class="info-item"><div class="info-key">ID</div><div class="info-val">${hoveredNode.id}</div></div>
      <div class="info-item"><div class="info-key">レイヤー</div><div class="info-val">${hoveredNode.layer}</div></div>
      <div class="info-item"><div class="info-key">説明</div><div class="info-val" style="font-size:10px">${hoveredNode.sublabel}</div></div>
      <div class="info-item"><div class="info-key">入力接続</div><div class="info-val">${incoming.length}</div></div>
      <div class="info-item"><div class="info-key">出力接続</div><div class="info-val">${outgoing.length}</div></div>
      <div class="info-item"><div class="info-key">活性度</div>
        <div class="info-bar"><div class="info-bar-fill" style="width:${hoveredNode.activity*100}%;background:${hoveredNode.color}"></div></div>
      </div>
    `;
  } else {
    document.getElementById('inspector-content').innerHTML = `<div style="color:var(--dim);font-size:10px;line-height:1.8">ノードにホバーすると<br>詳細が表示される</div>`;
  }
  if(!running) draw();
};

canvas.onwheel = e => {
  e.preventDefault();
  zoom *= e.deltaY < 0 ? 1.1 : 0.9;
  zoom = Math.max(0.3, Math.min(3, zoom));
  updateScaleHud();
  if(!running) draw();
};

window.onresize = resize;
resize();
draw();
</script>
</body>
</html>
