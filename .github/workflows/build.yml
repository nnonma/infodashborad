name: build and deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. リポジトリを取得 ──
      - name: checkout
        uses: actions/checkout@v4

      # ── 2. data.json の構文チェック ──
      - name: validate data.json
        run: |
          python3 -c "
          import json, sys
          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  json.load(f)
              print('data.json: OK')
          except json.JSONDecodeError as e:
              print(f'data.json: ERROR — {e}')
              sys.exit(1)
          "

      # ── 3. フォルダを走査してリンクを data.json に書き込む ──
      - name: generate links
        run: |
          python3 - <<'EOF'
          import json, os, re

          with open('data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          # フォルダ → links キーのマッピング
          folders = {
              'magazine': 'magazine',
              'docs':     'docs',
              'editor':   'editor',
          }

          # HTMLファイル名からラベルを生成（<title>タグを優先）
          def get_label(filepath, fallback):
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  m = re.search(r'<title>([^<]+)</title>', content, re.IGNORECASE)
                  if m:
                      # " — magazine" などのサフィックスを除去
                      label = re.sub(r'\s*[—\-–].+$', '', m.group(1)).strip()
                      return label if label else fallback
              except:
                  pass
              return fallback

          for folder, key in folders.items():
              if not os.path.isdir(folder):
                  data['links'][key] = []
                  continue

              files = sorted([
                  f for f in os.listdir(folder)
                  if f.endswith('.html')
              ])

              entries = []
              for fname in files:
                  fpath = os.path.join(folder, fname)
                  fallback = fname.replace('.html', '')
                  label = get_label(fpath, fallback)
                  href  = f'{folder}/{fname}'
                  entries.append({'label': label, 'href': href})

              data['links'][key] = entries
              print(f'{folder}/: {len(entries)} files -> links.{key}')

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print('links updated.')
          EOF

      # ── 4. 更新した data.json をコミット（変更があれば） ──
      - name: commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "auto: update links [skip ci]"
            git push
          fi

      # ── 5. GitHub Pages にデプロイ ──
      - name: setup pages
        uses: actions/configure-pages@v4

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: deploy to pages
        id: deployment
        uses: actions/deploy-pages@v4
