<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Live — dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap');
:root{--bg:#fdf6f0;--bg2:#fff9f5;--pink:#ffb5c8;--pink2:#ffd6e0;--mint:#b5ead7;--mint2:#d4f5e9;--lav:#c9b8f0;--lav2:#e4dcf7;--peach:#ffc8a0;--peach2:#ffe4cc;--sky:#a8d8ea;--sky2:#d4eef7;--text:#5c4a5a;--text2:#8a7a88;--text3:#b8a8b6;--shadow:rgba(180,140,160,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(253,246,240,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--pink2);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.back-btn{text-decoration:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--text2);padding:5px 12px;border-radius:20px;background:white;box-shadow:0 2px 8px var(--shadow);transition:transform .15s}
.back-btn:hover{transform:translateY(-1px)}
.header-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.live-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--pink2);color:#c06080;font-family:'Nunito',sans-serif}
.updated-tag{font-size:10px;color:var(--text3);font-family:'Nunito',sans-serif}
.container{max-width:720px;margin:0 auto;padding:20px 20px 80px}
.feed-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tab-btn{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;background:white;color:var(--text2);box-shadow:0 2px 8px var(--shadow)}
.tab-btn.active{border-color:currentColor}
.tab-all{color:#c07040}.tab-all.active{background:var(--peach2)}
.tab-riken{color:#c06080}.tab-riken.active{background:var(--pink2)}
.tab-nhk{color:#7060c0}.tab-nhk.active{background:var(--lav2)}
.tab-arxiv{color:#4080b0}.tab-arxiv.active{background:var(--sky2)}
.tab-jst{color:#409070}.tab-jst.active{background:var(--mint2)}
.feed-section{margin-bottom:28px}
.feed-label{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.feed-label::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.5}
.article-list{display:flex;flex-direction:column;gap:8px}
.article-card{background:white;border-radius:16px;padding:14px 16px;box-shadow:0 2px 12px var(--shadow);text-decoration:none;color:inherit;display:block;transition:transform .15s,box-shadow .15s;border-left:3px solid transparent}
.article-card:hover{transform:translateY(-1px);box-shadow:0 4px 18px var(--shadow)}
.article-card.is-read{opacity:.6}
.article-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:5px}
.article-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.article-source{font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.article-date{font-size:10px;color:var(--text3);font-family:'Nunito',sans-serif}
.article-desc{font-size:11px;color:var(--text2);line-height:1.6;margin-top:5px}
.read-btn{font-size:10px;font-family:'Nunito',sans-serif;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--text3);border:1px solid var(--pink2);cursor:pointer;margin-left:auto;flex-shrink:0}
.read-btn.done{background:var(--mint2);color:#409070;border-color:var(--mint)}
.loading-box{text-align:center;padding:60px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text3)}
.loading-spin{font-size:32px;display:block;animation:spin 1.5s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:var(--pink2);border-radius:16px;padding:20px;text-align:center;font-family:'Nunito',sans-serif;font-size:13px;color:#c06080;line-height:1.8}
.empty-state{text-align:center;padding:40px;color:var(--text3);font-family:'Nunito',sans-serif;font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a class="back-btn" href="index.html">← back</a>
    <span class="header-title">🔴 RSS Live</span>
    <span class="live-badge">CACHED</span>
  </div>
  <span class="updated-tag" id="updated-tag"></span>
</div>
<div class="container">
  <div class="feed-tabs">
    <button class="tab-btn tab-all active" onclick="filterFeed('all',this)">✦ すべて</button>
    <button class="tab-btn tab-riken" onclick="filterFeed('riken',this)">🔬 理研</button>
    <button class="tab-btn tab-nhk" onclick="filterFeed('nhk',this)">📺 NHK</button>
    <button class="tab-btn tab-arxiv" onclick="filterFeed('arxiv',this)">📄 arXiv</button>
    <button class="tab-btn tab-jst" onclick="filterFeed('jst',this)">🧪 JST</button>
  </div>
  <div id="feed-container">
    <div class="loading-box">
      <span class="loading-spin">🌸</span>読み込み中...
    </div>
  </div>
</div>
<script>
const FEED_ORDER = ['riken','nhk','arxiv','jst'];
const SOURCE_STYLES = {
  riken: {cls:'src-riken', border:'#ffb5c8', bg:'#ffd6e0', color:'#c06080'},
  nhk:   {cls:'src-nhk',   border:'#c9b8f0', bg:'#e4dcf7', color:'#7060c0'},
  arxiv: {cls:'src-arxiv', border:'#a8d8ea', bg:'#d4eef7', color:'#4080b0'},
  jst:   {cls:'src-jst',   border:'#b5ead7', bg:'#d4f5e9', color:'#409070'},
};

let cache = null;
let readIds = new Set(JSON.parse(localStorage.getItem('rss_read') || '[]'));
let currentFilter = 'all';

async function load() {
  const container = document.getElementById('feed-container');
  try {
    const res = await fetch('rss_cache.json?t=' + Date.now());
    if (!res.ok) throw new Error('not found');
    cache = await res.json();
    document.getElementById('updated-tag').textContent = '更新: ' + (cache.updated || '不明');
    renderFeed(currentFilter);
  } catch(e) {
    container.innerHTML = `
      <div class="error-box">
        🌧 rss_cache.json が見つかりません<br>
        <small>GitHub Actionsが実行されるとフィードが取得されます。<br>
        リポジトリにpushするとbuild.ymlが自動でRSSを取得・保存します。</small>
      </div>
    `;
  }
}

function renderFeed(filter) {
  const container = document.getElementById('feed-container');
  container.innerHTML = '';
  if (!cache) return;

  const feedIds = filter === 'all' ? FEED_ORDER : [filter];

  let hasContent = false;
  feedIds.forEach(id => {
    const feed = cache.feeds[id];
    if (!feed || !feed.articles.length) return;
    hasContent = true;
    renderSection(container, id, feed);
  });

  if (!hasContent) {
    container.innerHTML = '<div class="empty-state">🌿 記事がありません</div>';
  }
}

function renderSection(container, feedId, feed) {
  const style = SOURCE_STYLES[feedId] || {border:'#ccc',bg:'#eee',color:'#666'};
  const sec = document.createElement('div');
  sec.className = 'feed-section';
  sec.innerHTML = `<div class="feed-label" style="color:${feed.color||style.color}">${feed.label}</div>`;

  const list = document.createElement('div');
  list.className = 'article-list';

  feed.articles.forEach(a => {
    const isRead = readIds.has(a.id);
    const card = document.createElement('a');
    card.className = 'article-card' + (isRead ? ' is-read' : '');
    card.href = a.link || '#';
    card.target = '_blank';
    card.rel = 'noopener';
    card.style.borderLeftColor = style.border;

    card.innerHTML = `
      <div class="article-title">${a.title}</div>
      <div class="article-meta">
        <span class="article-source" style="background:${style.bg};color:${style.color}">${feedId.toUpperCase()}</span>
        <span class="article-date">${a.date || ''}</span>
        <button class="read-btn ${isRead?'done':''}" data-id="${a.id}"
          onclick="toggleRead(event,'${a.id}',this)">${isRead?'✓ 既読':'既読'}</button>
      </div>
      ${a.desc ? `<div class="article-desc">${a.desc}…</div>` : ''}
    `;
    list.appendChild(card);
  });

  sec.appendChild(list);
  container.appendChild(sec);
}

function toggleRead(e, id, btn) {
  e.preventDefault();
  e.stopPropagation();
  const card = btn.closest('.article-card');
  if (readIds.has(id)) {
    readIds.delete(id);
    btn.className = 'read-btn';
    btn.textContent = '既読';
    card.classList.remove('is-read');
  } else {
    readIds.add(id);
    btn.className = 'read-btn done';
    btn.textContent = '✓ 既読';
    card.classList.add('is-read');
  }
  localStorage.setItem('rss_read', JSON.stringify([...readIds]));
}

function filterFeed(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed(filter);
}

load();
</script>
</body>
</html>
